name: Bug report
description: Report a reproducible problem
title: "[bug] "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide a reproducible sequence
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: checkboxes
    id: area
    attributes:
      label: Affected area
      options:
        - label: Docker / container runtime
        - label: WebUI
        - label: API
        - label: filesystem / extraction / storage
        - label: HTTPS / TLS
        - label: documentation

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      description: Paste only relevant excerpts if available
